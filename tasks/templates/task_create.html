{% extends "base.html" %}

{% block title %}Add New Task | TaskFlow{% endblock %}

{% block content %}
<div class="form-wrapper">
    <div class="form-card">
        <div class="form-header">
            <h2>Add A Task</h2>
            <p>Organize your day with a new task.</p>
        </div>

        <form action="" method="post" novalidate>
            {% csrf_token %}
            {{ form.as_p }}
            
            <button type="submit" class="btn-submit" id="addBtn">
                <i data-lucide="plus-circle" style="width: 18px;"></i>
                Add Task
            </button>
        </form>

        <a href="{% url 'tasks:home' %}" class="back-link">
            <i data-lucide="arrow-left" style="width: 16px;"></i>
            Back To Home
        </a>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    if (typeof lucide !== 'undefined') {
        lucide.createIcons();
    }

    const addForm = document.querySelector('form');
    const addBtn = document.getElementById('addBtn');

    addForm.addEventListener('submit', () => {
        addBtn.innerHTML = '<i data-lucide="loader-2" style="width: 18px;" class="spin"></i> Creating...';
        addBtn.disabled = true;
        addBtn.style.opacity = '0.7';
        if (typeof lucide !== 'undefined') lucide.createIcons();
    });
</script>
{% endblock %}
